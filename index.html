<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Mayia — Inteligencia Artificial que Transforma innovación en resultados. Democratizamos el acceso a la IA en México con FLAI y 30 centros de datos EdgeNet." />
  <meta name="theme-color" content="#040d04" />
  <title>Mayia — IA que Transforma México</title>
  <link rel="icon" type="image/png" href="assets/favicon.png" />

  <!-- Fuente -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet" />

  <!-- ── React + Babel (para componentes JSX) ──── -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- ── GSAP ─────────────────────────────────────── -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <!-- ── Estilos globales ───────────────────────── -->
  <link rel="stylesheet" href="css/base.css" />

  <style>
    #bg-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      display: block;
    }
    #bg-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: linear-gradient(
        to bottom,
        rgba(14,26,14,.65) 0%,
        rgba(14,26,14,.45) 50%,
        rgba(14,26,14,.7)  100%
      );
    }
    #app { position: relative; z-index: 2; }
  </style>

  <!-- ── Estilos de cada sección (uno por sección) ── -->
  <link rel="stylesheet" href="sections/nav/nav.css" />
  <link rel="stylesheet" href="sections/about/about.css" />
  <link rel="stylesheet" href="sections/pildoras/pildoras.css" />
  <link rel="stylesheet" href="sections/hubs/hubs.css" />
  <link rel="stylesheet" href="sections/academia/academia.css" />
  <link rel="stylesheet" href="sections/contacto/contacto.css" />
</head>
<body>

  <!-- Fondo canvas animado (reemplaza video) -->
  <canvas id="bg-canvas"></canvas>
  <div id="bg-overlay"></div>

  <!--
    Punto de montaje principal.
    El loader.js inyecta aquí todas las secciones
    en el orden definido en js/loader.js.
  -->
  <div id="app"></div>

  <!-- ── HTML de cada sección (uno por sección) ─── -->
  <script src="sections/nav/nav.js"></script>
  <script src="sections/about/about.js"></script>
  <script src="sections/pildoras/pildoras.js"></script>
  <script src="sections/hubs/hubs-mount.js"></script>
  <script src="sections/academia/academia.js"></script>
  <script src="sections/contacto/contacto.js"></script>

  <!-- ── Ensamblador (une todas las secciones) ──── -->
  <script src="js/loader.js"></script>

  <!-- ── Lógica de interacción global ───────────── -->
  <script src="js/main.js"></script>

  <!-- ── Componente React del mapa ─────────────── -->
  <script type="text/babel" src="sections/hubs/hubs.jsx"></script>

  <!-- ── Formulario de contacto + Firebase ─────── -->
  <script type="module" src="js/firebase-form.js"></script>

  <!-- ── Animación de cuadrícula GSAP ──────────── -->
  <script>
  (function () {
    const canvas  = document.getElementById('bg-canvas');
    const ctx     = canvas.getContext('2d');
    const CELL    = 52;
    const BG      = '#0e1a0e';       // verde muy oscuro / carbón verdoso
    const COLORS  = [
      { r:160, g:212, b:109 },       // verde neon
      { r:160, g:212, b:109 },       // verde neon (doble peso → más frecuente)
      { r:255, g:140, b:20  },       // naranja neon
      { r:100, g:220, b:80  },       // verde eléctrico
      { r:255, g:100, b:0   },       // naranja puro
    ];
    const MAX_ACTIVE = 20;
    const INTERVAL   = 280;

    let cols, rows, cells = [], animating = true;

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
      cols = Math.ceil(canvas.width  / CELL) + 1;
      rows = Math.ceil(canvas.height / CELL) + 1;
    }

    function drawGrid() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = BG;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.strokeStyle = 'rgba(160,212,109,.07)';
      ctx.lineWidth   = 1;
      for (let c = 0; c <= cols; c++) {
        ctx.beginPath();
        ctx.moveTo(c * CELL, 0);
        ctx.lineTo(c * CELL, canvas.height);
        ctx.stroke();
      }
      for (let r = 0; r <= rows; r++) {
        ctx.beginPath();
        ctx.moveTo(0, r * CELL);
        ctx.lineTo(canvas.width, r * CELL);
        ctx.stroke();
      }
    }

    function drawCells() {
      cells.forEach(cell => {
        const a = cell.opacity;
        if (a <= 0) return;
        const { r, g, b } = cell.color;

        // relleno tenue
        ctx.fillStyle = `rgba(${r},${g},${b},${(a * .15).toFixed(3)})`;
        ctx.fillRect(cell.x * CELL + 1, cell.y * CELL + 1, CELL - 2, CELL - 2);

        // borde neon brillante
        ctx.strokeStyle = `rgba(${r},${g},${b},${(a * .9).toFixed(3)})`;
        ctx.lineWidth   = 1.2;
        ctx.strokeRect(cell.x * CELL + 1, cell.y * CELL + 1, CELL - 2, CELL - 2);

        // glow radial
        const cx   = (cell.x + .5) * CELL;
        const cy   = (cell.y + .5) * CELL;
        const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, CELL * .7);
        grad.addColorStop(0, `rgba(${r},${g},${b},${(a * .18).toFixed(3)})`);
        grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
        ctx.fillStyle = grad;
        ctx.fillRect(cell.x * CELL, cell.y * CELL, CELL, CELL);

        // brillo exterior (halo fuera de la celda)
        const halo = ctx.createRadialGradient(cx, cy, CELL * .3, cx, cy, CELL * 1.4);
        halo.addColorStop(0, `rgba(${r},${g},${b},${(a * .08).toFixed(3)})`);
        halo.addColorStop(1, `rgba(${r},${g},${b},0)`);
        ctx.fillStyle = halo;
        ctx.fillRect((cell.x - 1) * CELL, (cell.y - 1) * CELL, CELL * 3, CELL * 3);
      });
    }

    function render() {
      if (!animating) return;
      drawGrid();
      drawCells();
      requestAnimationFrame(render);
    }

    function spawnCell() {
      if (!animating) return;
      if (cells.length >= MAX_ACTIVE) cells.shift();

      const color = COLORS[Math.floor(Math.random() * COLORS.length)];
      const cell  = {
        x: Math.floor(Math.random() * cols),
        y: Math.floor(Math.random() * rows),
        opacity: 0,
        color,
      };
      cells.push(cell);

      const dur = 1.6 + Math.random() * 2.8;
      gsap.timeline()
        .to(cell, { opacity: 1, duration: dur * .3, ease: 'power2.out' })
        .to(cell, { opacity: 0, duration: dur * .7, ease: 'power2.in' })
        .then(() => { cells = cells.filter(c => c !== cell); });
    }

    document.addEventListener('visibilitychange', () => {
      animating = !document.hidden;
      if (animating) render();
    });
    window.addEventListener('resize', resize, { passive: true });

    resize();
    render();
    for (let i = 0; i < 10; i++) setTimeout(spawnCell, i * 100);
    setInterval(spawnCell, INTERVAL);
  })();
  </script>

</body>
</html>
